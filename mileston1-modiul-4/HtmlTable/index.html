<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HtmlTable</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <table class="pricing-table">
                <thead>
                    <tr>
                        <th>Features</th>
                        <th>Basic Plan</th>
                        <th>Standard Plan</th>
                        <th>Premium Plan</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Monthly Storage</td>
                        <td>10 GB</td>
                        <td>100 GB</td>
                        <td>Unlimited</td>
                    </tr>
                    <tr>
                        <td>User Accounts</td>
                        <td>1 User</td>
                        <td>Up to 5 Users</td>
                        <td>Unlimited</td>
                    </tr>
                    <tr>
                        <td>24/7 Support</td>
                        <td>Email Only</td>
                        <td>Email & Chat</td>
                        <td>Priority Phone & Chat</td>
                    </tr>
                    <tr>
                        <td>Advanced Analytics</td>
                        <td>✗</td>
                        <td>✓</td>
                        <td>✓</td>
                    </tr>
                    <tr>
                        <td>Custom Branding</td>
                        <td>✗</td>
                        <td>✗</td>
                        <td>✓</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>

</html>
